<section>
  <!-- header -->
  <div class="flex flex-col lg:flex-row lg:justify-between">
    <!-- title -->
    <div>
      <h2 class="leading-9 tracking-[-0.75px] text-[#041B3C] text-[30px] font-semibold">
        Active Workboard
      </h2>
      <p class="leading-5 text-[14px] text-[#64748B] tracking-normal hidden lg:block">
        Curating Project Alpha's production pipeline and milestones.
      </p>
    </div>
    <!-- search -->
    <div class="flex flex-col lg:flex-row gap-4 lg:gap-3 lg:items-center mt-5">
      <!-- input searc -->
      <div class="relative flex-1 lg:flex-none">
        <input
          type="text"
          placeholder="Search epics..."
          class="input-control placeholder:text-[#737685] text-[14px] leading-[100%] tracking-normal pt-2.25 pb-2.5 pl-10 pr-4 rounded-sm block w-full lg:w-[256px]"
        />
        <span class="absolute top-1/2 -translate-y-1/2 left-3"
          ><svg
            width="11"
            height="11"
            viewBox="0 0 11 11"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M9.68333 10.5L6.00833 6.825C5.71667 7.05833 5.38125 7.24306 5.00208 7.37917C4.62292 7.51528 4.21944 7.58333 3.79167 7.58333C2.73194 7.58333 1.83507 7.21632 1.10104 6.48229C0.367014 5.74826 0 4.85139 0 3.79167C0 2.73194 0.367014 1.83507 1.10104 1.10104C1.83507 0.367014 2.73194 0 3.79167 0C4.85139 0 5.74826 0.367014 6.48229 1.10104C7.21632 1.83507 7.58333 2.73194 7.58333 3.79167C7.58333 4.21944 7.51528 4.62292 7.37917 5.00208C7.24306 5.38125 7.05833 5.71667 6.825 6.00833L10.5 9.68333L9.68333 10.5ZM3.79167 6.41667C4.52083 6.41667 5.14062 6.16146 5.65104 5.65104C6.16146 5.14062 6.41667 4.52083 6.41667 3.79167C6.41667 3.0625 6.16146 2.44271 5.65104 1.93229C5.14062 1.42188 4.52083 1.16667 3.79167 1.16667C3.0625 1.16667 2.44271 1.42188 1.93229 1.93229C1.42188 2.44271 1.16667 3.0625 1.16667 3.79167C1.16667 4.52083 1.42188 5.14062 1.93229 5.65104C2.44271 6.16146 3.0625 6.41667 3.79167 6.41667Z"
              fill="#737685"
            />
          </svg>
        </span>
      </div>
      <a
        [routerLink]="['/project', projectId(), 'epics', 'new']"
        class="btn-Primary bg-linear-to-r from-primary to-primary-container gap-2 py-2 px-4 flex justify-center items-center lg:hidden"
        ><span
          ><svg
            width="9"
            height="9"
            viewBox="0 0 9 9"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M3.5 4.66667H0V3.5H3.5V0H4.66667V3.5H8.16667V4.66667H4.66667V8.16667H3.5V4.66667Z"
              fill="white"
            />
          </svg>
        </span>
        <span>Create Task</span></a
      >
      <!-- select -->
      <!-- View switcher (inline in the page, not a separate component) -->
      <div class="relative lg:w-[156.83px] lg:block hidden">
        <button
          type="button"
          (click)="toggleViewMenu()"
          class="w-full flex items-center justify-between gap-2 border border-[#C3C6D633]/20 bg-white py-2 px-4 rounded-sm text-[14px] text-[#434654] cursor-pointer shadow shadow-[#0000000D]"
        >
          <span class="flex items-center gap-2">
            @if (selectedView() === 'list') {
              <svg
                width="14"
                height="6"
                viewBox="0 0 14 6"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M4.08333 1.16667V0H12.25V1.16667H4.08333ZM4.08333 3.5V2.33333H12.25V3.5H4.08333ZM4.08333 5.83333V4.66667H12.25V5.83333H4.08333ZM2.33333 1.16667C2.16806 1.16667 2.02951 1.11076 1.91771 0.998958C1.8059 0.887153 1.75 0.748611 1.75 0.583333C1.75 0.418056 1.8059 0.279514 1.91771 0.167708C2.02951 0.0559028 2.16806 0 2.33333 0C2.49861 0 2.63715 0.0559028 2.74896 0.167708C2.86076 0.279514 2.91667 0.418056 2.91667 0.583333C2.91667 0.748611 2.86076 0.887153 2.74896 0.998958C2.63715 1.11076 2.49861 1.16667 2.33333 1.16667ZM2.33333 3.5C2.16806 3.5 2.02951 3.4441 1.91771 3.33229C1.8059 3.22049 1.75 3.08194 1.75 2.91667C1.75 2.75139 1.8059 2.61285 1.91771 2.50104C2.02951 2.38924 2.16806 2.33333 2.33333 2.33333C2.49861 2.33333 2.63715 2.38924 2.74896 2.50104C2.86076 2.61285 2.91667 2.75139 2.91667 2.91667C2.91667 3.08194 2.86076 3.22049 2.74896 3.33229C2.63715 3.4441 2.49861 3.5 2.33333 3.5ZM2.33333 5.83333C2.16806 5.83333 2.02951 5.77743 1.91771 5.66563C1.8059 5.55382 1.75 5.41528 1.75 5.25C1.75 5.08472 1.8059 4.94618 1.91771 4.83437C2.02951 4.72257 2.16806 4.66667 2.33333 4.66667C2.49861 4.66667 2.63715 4.72257 2.74896 4.83437C2.86076 4.94618 2.91667 5.08472 2.91667 5.25C2.91667 5.41528 2.86076 5.55382 2.74896 5.66563C2.63715 5.77743 2.49861 5.83333 2.33333 5.83333Z"
                  fill="#003D9B"
                />
              </svg>
            } @else {
              <svg
                width="14"
                height="14"
                viewBox="0 0 14 14"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M0 6V0H6V6H0ZM0 13.5V7.5H6V13.5H0ZM7.5 6V0H13.5V6H7.5ZM7.5 13.5V7.5H13.5V13.5H7.5ZM1.5 4.5H4.5V1.5H1.5V4.5ZM9 4.5H12V1.5H9V4.5ZM9 12H12V9H9V12ZM1.5 12H4.5V9H1.5V12Z"
                  fill="#041B3C"
                />
              </svg>
            }
            {{ selectedViewLabel }}
          </span>

          <svg
            width="17"
            height="6"
            viewBox="0 0 17 6"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12.5 5.55L8 1.05L9.05 0L12.5 3.45L15.95 0L17 1.05L12.5 5.55Z"
              fill="#041B3C"
            />
          </svg>
        </button>

        @if (isViewMenuOpen()) {
          <ul
            class="absolute z-10 mt-1 w-full bg-white border border-[#C3C6D633]/20 rounded-sm shadow-md overflow-hidden"
          >
            @for (option of viewOptions; track option.value) {
              <li
                role="option"
                [attr.aria-selected]="selectedView() === option.value"
                (click)="selectView(option.value)"
                [class]="
                  'flex items-center gap-2 py-2 px-4 text-[14px] cursor-pointer transition ' +
                  viewOptionClasses(option.value)
                "
              >
                @if (option.value === 'list') {
                  <svg
                    width="14"
                    height="6"
                    viewBox="0 0 14 6"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M4.08333 1.16667V0H12.25V1.16667H4.08333ZM4.08333 3.5V2.33333H12.25V3.5H4.08333ZM4.08333 5.83333V4.66667H12.25V5.83333H4.08333ZM2.33333 1.16667C2.16806 1.16667 2.02951 1.11076 1.91771 0.998958C1.8059 0.887153 1.75 0.748611 1.75 0.583333C1.75 0.418056 1.8059 0.279514 1.91771 0.167708C2.02951 0.0559028 2.16806 0 2.33333 0C2.49861 0 2.63715 0.0559028 2.74896 0.167708C2.86076 0.279514 2.91667 0.418056 2.91667 0.583333C2.91667 0.748611 2.86076 0.887153 2.74896 0.998958C2.63715 1.11076 2.49861 1.16667 2.33333 1.16667ZM2.33333 3.5C2.16806 3.5 2.02951 3.4441 1.91771 3.33229C1.8059 3.22049 1.75 3.08194 1.75 2.91667C1.75 2.75139 1.8059 2.61285 1.91771 2.50104C2.02951 2.38924 2.16806 2.33333 2.33333 2.33333C2.49861 2.33333 2.63715 2.38924 2.74896 2.50104C2.86076 2.61285 2.91667 2.75139 2.91667 2.91667C2.91667 3.08194 2.86076 3.22049 2.74896 3.33229C2.63715 3.4441 2.49861 3.5 2.33333 3.5ZM2.33333 5.83333C2.16806 5.83333 2.02951 5.77743 1.91771 5.66563C1.8059 5.55382 1.75 5.41528 1.75 5.25C1.75 5.08472 1.8059 4.94618 1.91771 4.83437C2.02951 4.72257 2.16806 4.66667 2.33333 4.66667C2.49861 4.66667 2.63715 4.72257 2.74896 4.83437C2.86076 4.94618 2.91667 5.08472 2.91667 5.25C2.91667 5.41528 2.86076 5.55382 2.74896 5.66563C2.63715 5.77743 2.49861 5.83333 2.33333 5.83333Z"
                      fill="#003D9B"
                    />
                  </svg>
                } @else {
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 14 14"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M0 6V0H6V6H0ZM0 13.5V7.5H6V13.5H0ZM7.5 6V0H13.5V6H7.5ZM7.5 13.5V7.5H13.5V13.5H7.5ZM1.5 4.5H4.5V1.5H1.5V4.5ZM9 4.5H12V1.5H9V4.5ZM9 12H12V9H9V12ZM1.5 12H4.5V9H1.5V12Z"
                      fill="#041B3C"
                    />
                  </svg>
                }
                {{ option.label }}
              </li>
            }
          </ul>
        }
      </div>

      <button
        type="button"
        class="w-8.5 h-7 justify-center items-center rounded-sm bg-[#D7E2FF] lg:flex hidden"
        aria-label="Filter"
        [class]="selectedView() === 'list' ? 'hidden' : 'flex'"
      >
        <svg
          width="18"
          height="12"
          viewBox="0 0 18 12"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M7 12V10H11V12H7ZM3 7V5H15V7H3ZM0 2V0H18V2H0Z" fill="#041B3C" />
        </svg>
      </button>
    </div>
  </div>
</section>
