<div
  class="flex justify-between items-center gap-3 sm:gap-4 p-4 bg-white border border-[#E5E9F5] lg:border-none rounded-lg lg:rounded-0 hover:border-[#0052CC] transition-colors cursor-pointer"
>
  <!-- Title + Assignee -->
  <div class="flex flex-col gap-1.5 min-w-0">
    <span
      class="text-[14px] font-semibold leading-5 lg:text-[16px] lg:font-medium text-[#041B3C] truncate lg:leading-6"
    >
      {{ task()?.title }}
    </span>

    <div class="flex items-center gap-2">
      @if (task()?.assignee?.name) {
        <div
          class="w-5 h-5 rounded-full bg-[#0052CC] text-white flex items-center justify-center text-[9px] font-medium shrink-0"
        >
          {{ getInitials(task()?.assignee?.name!) }}
        </div>
        <span
          class="text-[11px] lg:leading-[16.5px] tracking-normal lg:text-[12px] leading-4 text-[#041B3C99]/60 truncate"
          >{{ task()?.assignee?.name }}</span
        >
      } @else {
        <span class="w-5 h-5 rounded-sm bg-[#E8EDFF] flex items-center justify-center shrink-0">
          <svg
            width="8"
            height="8"
            viewBox="0 0 8 8"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M4 4C3.45 4 2.97917 3.80417 2.5875 3.4125C2.19583 3.02083 2 2.55 2 2C2 1.45 2.19583 0.979167 2.5875 0.5875C2.97917 0.195833 3.45 0 4 0C4.55 0 5.02083 0.195833 5.4125 0.5875C5.80417 0.979167 6 1.45 6 2C6 2.55 5.80417 3.02083 5.4125 3.4125C5.02083 3.80417 4.55 4 4 4ZM0 8V6.6C0 6.31667 0.0729167 6.05625 0.21875 5.81875C0.364583 5.58125 0.558333 5.4 0.8 5.275C1.31667 5.01667 1.84167 4.82292 2.375 4.69375C2.90833 4.56458 3.45 4.5 4 4.5C4.55 4.5 5.09167 4.56458 5.625 4.69375C6.15833 4.82292 6.68333 5.01667 7.2 5.275C7.44167 5.4 7.63542 5.58125 7.78125 5.81875C7.92708 6.05625 8 6.31667 8 6.6V8H0ZM1 7H7V6.6C7 6.50833 6.97708 6.425 6.93125 6.35C6.88542 6.275 6.825 6.21667 6.75 6.175C6.3 5.95 5.84583 5.78125 5.3875 5.66875C4.92917 5.55625 4.46667 5.5 4 5.5C3.53333 5.5 3.07083 5.55625 2.6125 5.66875C2.15417 5.78125 1.7 5.95 1.25 6.175C1.175 6.21667 1.11458 6.275 1.06875 6.35C1.02292 6.425 1 6.50833 1 6.6V7ZM4 3C4.275 3 4.51042 2.90208 4.70625 2.70625C4.90208 2.51042 5 2.275 5 2C5 1.725 4.90208 1.48958 4.70625 1.29375C4.51042 1.09792 4.275 1 4 1C3.725 1 3.48958 1.09792 3.29375 1.29375C3.09792 1.48958 3 1.725 3 2C3 2.275 3.09792 2.51042 3.29375 2.70625C3.48958 2.90208 3.725 3 4 3Z"
              fill="#041B3C"
            />
          </svg>
        </span>
        <span class="text-[12px] text-[#737685]">Unassigned</span>
      }
    </div>
  </div>

  <!-- Status + Due date -->
  <div
    class="flex items-center justify-between sm:flex-col sm:items-end sm:justify-start gap-1.5 pt-2 sm:pt-0 shrink-0"
  >
    <div class="flex flex-col items-center gap-1">
      <span
        class="text-[10px] font-bold leading-3.75 text-[#041B3C66]/80 uppercase tracking-wide hidden lg:block"
      >
        Due date
      </span>

      @if (isOverdue()) {
        <span class="text-[12px] font-medium text-[#E5484D] flex items-center gap-1">
          <svg
            width="12"
            height="12"
            viewBox="0 0 12 12"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M6 1L11 10H1L6 1Z" stroke="#E5484D" stroke-width="1" stroke-linejoin="round" />
            <path d="M6 4.5V6.5" stroke="#E5484D" stroke-width="1" stroke-linecap="round" />
            <circle cx="6" cy="8.25" r="0.5" fill="#E5484D" />
          </svg>
          {{ task()?.due_date | date: 'MMM d, y' }}
        </span>
      } @else {
        <div class="flex space-x-1.5">
          <span
            ><svg
              width="11"
              height="12"
              viewBox="0 0 11 12"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M6.70833 9.33333C6.3 9.33333 5.95486 9.19236 5.67292 8.91042C5.39097 8.62847 5.25 8.28333 5.25 7.875C5.25 7.46667 5.39097 7.12153 5.67292 6.83958C5.95486 6.55764 6.3 6.41667 6.70833 6.41667C7.11667 6.41667 7.46181 6.55764 7.74375 6.83958C8.02569 7.12153 8.16667 7.46667 8.16667 7.875C8.16667 8.28333 8.02569 8.62847 7.74375 8.91042C7.46181 9.19236 7.11667 9.33333 6.70833 9.33333ZM1.16667 11.6667C0.845833 11.6667 0.571181 11.5524 0.342708 11.324C0.114236 11.0955 0 10.8208 0 10.5V2.33333C0 2.0125 0.114236 1.73785 0.342708 1.50937C0.571181 1.2809 0.845833 1.16667 1.16667 1.16667H1.75V0H2.91667V1.16667H7.58333V0H8.75V1.16667H9.33333C9.65417 1.16667 9.92882 1.2809 10.1573 1.50937C10.3858 1.73785 10.5 2.0125 10.5 2.33333V10.5C10.5 10.8208 10.3858 11.0955 10.1573 11.324C9.92882 11.5524 9.65417 11.6667 9.33333 11.6667H1.16667ZM1.16667 10.5H9.33333V4.66667H1.16667V10.5ZM1.16667 3.5H9.33333V2.33333H1.16667V3.5ZM1.16667 3.5V2.33333V3.5Z"
                fill="#434654"
                fill-opacity="0.7"
              />
            </svg>
          </span>
          <span
            class="text-[11px] lg:text-[12px] text-[#041B3C]/70 leading-3.75 lg:leading-4 tracking-[-0.55px] lg:tracking-normal font-bold lg:font-medium"
            >{{ task()?.due_date | date: 'MMM d, y' }}</span
          >
        </div>
      }
    </div>
  </div>
</div>
