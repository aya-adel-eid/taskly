<app-toast-massage [message]="successMessage()" [flag]="true"></app-toast-massage>
<div
  class="bg-transparent lg:bg-white rounded-lg w-full lg:p-6 lg:shadow-[0px_24px_48px_-12px_rgba(4,27,60,0.06)]"
>
  <form class="w-full flex flex-col gap-8" [formGroup]="addNewTask" (ngSubmit)="createNewTask()">
    <div>
      <label for="projectTitle" class="label-input"
        >Project TITLE <span class="text-red-600">*</span></label
      >
      <input
        type="text"
        id="projectTitle"
        class="bg-[#D7E2FF] rounded-sm w-full text-[18px] tracking-normal font-medium leading-[100%] pt-3.75 pb-4 px-4 border-0 outline-none"
        placeholder="e.g., Finalize structural schematics"
        formControlName="title"
      />
      @if (addNewTask.get('title')?.touched && addNewTask.get('title')?.invalid) {
        @if (addNewTask.get('title')?.hasError('required')) {
          <p
            class="text-[11px] leading-4 tracking-[0.55px] gap-1.5 flex text-[#BA1A1A] uppercase font-medium pt-1"
          >
            <span
              ><svg
                width="12"
                height="12"
                viewBox="0 0 12 12"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M5.83333 8.75C5.99861 8.75 6.13715 8.6941 6.24896 8.58229C6.36076 8.47049 6.41667 8.33194 6.41667 8.16667C6.41667 8.00139 6.36076 7.86285 6.24896 7.75104C6.13715 7.63924 5.99861 7.58333 5.83333 7.58333C5.66806 7.58333 5.52951 7.63924 5.41771 7.75104C5.3059 7.86285 5.25 8.00139 5.25 8.16667C5.25 8.33194 5.3059 8.47049 5.41771 8.58229C5.52951 8.6941 5.66806 8.75 5.83333 8.75ZM5.25 6.41667H6.41667V2.91667H5.25V6.41667ZM5.83333 11.6667C5.02639 11.6667 4.26806 11.5135 3.55833 11.2073C2.84861 10.901 2.23125 10.4854 1.70625 9.96042C1.18125 9.43542 0.765625 8.81806 0.459375 8.10833C0.153125 7.39861 0 6.64028 0 5.83333C0 5.02639 0.153125 4.26806 0.459375 3.55833C0.765625 2.84861 1.18125 2.23125 1.70625 1.70625C2.23125 1.18125 2.84861 0.765625 3.55833 0.459375C4.26806 0.153125 5.02639 0 5.83333 0C6.64028 0 7.39861 0.153125 8.10833 0.459375C8.81806 0.765625 9.43542 1.18125 9.96042 1.70625C10.4854 2.23125 10.901 2.84861 11.2073 3.55833C11.5135 4.26806 11.6667 5.02639 11.6667 5.83333C11.6667 6.64028 11.5135 7.39861 11.2073 8.10833C10.901 8.81806 10.4854 9.43542 9.96042 9.96042C9.43542 10.4854 8.81806 10.901 8.10833 11.2073C7.39861 11.5135 6.64028 11.6667 5.83333 11.6667ZM5.83333 10.5C7.13611 10.5 8.23958 10.0479 9.14375 9.14375C10.0479 8.23958 10.5 7.13611 10.5 5.83333C10.5 4.53056 10.0479 3.42708 9.14375 2.52292C8.23958 1.61875 7.13611 1.16667 5.83333 1.16667C4.53056 1.16667 3.42708 1.61875 2.52292 2.52292C1.61875 3.42708 1.16667 4.53056 1.16667 5.83333C1.16667 7.13611 1.61875 8.23958 2.52292 9.14375C3.42708 10.0479 4.53056 10.5 5.83333 10.5Z"
                  fill="#BA1A1A"
                />
              </svg> </span
            ><span>This field is required</span>
          </p>
        }
      }
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <!-- status -->
      <div>
        <label class="label-input">Status*</label>
        <div class="relative">
          <select
            class="input-control appearance-none cursor-pointer w-full"
            formControlName="status"
          >
            <option value="TO_DO" disabled selected>TO DO</option>
            @for (statue of statues; track $index) {
              <option [value]="statue.value">{{ statue.value }}</option>
            }
          </select>
          <!-- Arrow -->
          <div
            class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 20 20"
              fill="none"
            >
              <path
                d="M5 7.5L10 12.5L15 7.5"
                stroke="#6B7280"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>
      <!-- Assignee -->
      <div>
        <label class="label-input">Assignee</label>
        <div class="relative">
          <select
            class="input-control w-full appearance-none cursor-pointer"
            formControlName="assignee_id"
          >
            <option [ngValue]="null" disabled selected>Select Team Member</option>
            @for (member of allMembers(); track member.project_id) {
              <option [value]="member.user_id">{{ member.metadata.name }}</option>
            }
          </select>
          <!-- Arrow -->
          <div
            class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 20 20"
              fill="none"
            >
              <path
                d="M5 7.5L10 12.5L15 7.5"
                stroke="#6B7280"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>
    <div>
      <!-- epic Id -->
      <label class="label-input">Epic</label>
      <div class="relative">
        <select
          class="input-control appearance-none cursor-pointer w-full"
          formControlName="epic_id"
        >
          <option [ngValue]="null" disabled selected>Select Epic</option>
          @for (epic of allEpics(); track $index) {
            <option [value]="epic.id">{{ epic.epic_id }} {{ truncate(epic.title) }}</option>
          }
        </select>
        <!-- Arrow -->
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-neutral-500">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 20 20"
            fill="none"
          >
            <path
              d="M5 7.5L10 12.5L15 7.5"
              stroke="#6B7280"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>
    </div>
    <div>
      <!-- date -->
      <label class="label-input">Due Date</label>
      <input
        type="date"
        placeholder="mm/dd/yyyy"
        class="input-control w-full"
        formControlName="due_date"
      />
    </div>
    <!-- description -->
    <div>
      <label for="projectdescription" class="label-input flex justify-between">
        <span>Description</span>
      </label>
      <textarea
        id="projectdescription"
        rows="4"
        class="input-control pt-3 text-[15px] leading-6 tracking-normal px-4 w-full"
        placeholder="Provide detailed context for this task..."
        formControlName="description"
      ></textarea>
    </div>
    <div
      class="pt-8 border-t border-t-[#C3C6D61A] flex lg:flex-row flex-col lg:items-center lg:justify-end gap-4"
    >
      <button
        [routerLink]="['/project', projectId(), 'epics']"
        class="font-semibold text-[.875rem] text-[#4F5F7B] leading-5 tracking-normal order-2 lg:order-1 cursor-pointer py-3 px-6"
      >
        Back
      </button>
      <button
        type="submit"
        class="bg-linear-to-r from-primary to-primary-container btn-Primary px-7 order-1 lg:order-2 flex justify-center items-center gap-2"
      >
        <span class="block lg:hidden"
          ><svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M6 8H0V6H6V0H8V6H14V8H8V14H6V8Z" fill="white" />
          </svg>
        </span>
        <span>Create Task</span>
      </button>
    </div>
  </form>
</div>
