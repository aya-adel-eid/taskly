  <div class="flex flex-col items-center">
    <h3
      class="text-[20px] lg:text-[1.875rem] leading-9 tracking-[-0.75px] text-[#041B3C] pt-4 font-semibold"
    >
      No epics in this project yet.
    </h3>
    <p class="text-[16px] lg:text-lg leading-7.5 tracking-normal text-[#434654] py-4 lg:w-md">
      Break down your large project into manageable epics to track progress better and maintain
      architectural clarity.
    </p>
    <a
      [routerLink]="['/project', projectId(), 'epics', 'new']"
      class="btn-Primary shadow-lg shadow-primary/40 bg-linear-to-r from-primary to-primary-container hidden lg:flex justify-center items-center gap-2 py-3 w-fit"
    >
      <span
        ><svg
          width="16"
          height="20"
          viewBox="0 0 16 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M6.55 16.2L11.725 10H7.725L8.45 4.325L3.825 11H7.3L6.55 16.2ZM4 20L5 13H0L9 0H11L10 8H16L6 20H4Z"
            fill="white"
          />
        </svg>
      </span>
      <span class="ms-2">Create First Epic</span>
    </a>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 py-10">
    @for (card of cardData; track $index) {
      <div class="bg-[#F1F3FF] rounded-[.5rem] border border-[#00000000] p-4 py-y">
        <img [src]="card.img" alt="" />
        <h3 class="text-[1rem] font-semibold leading-6 tracking-normal py-3 text-[#041B3C]">
          {{ card.title }}
        </h3>
        <p class="text-xs leading-5 tracking-normal w-45">{{ card.content }}</p>
      </div>
    }
  </div>
</section>
