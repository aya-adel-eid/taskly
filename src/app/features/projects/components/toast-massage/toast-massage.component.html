@if (message()) {
  <div
    class="fixed top-5 right-5 z-50 text-white px-5 py-3 rounded-lg shadow-lg animate-fade"
    [class]="flag() ? 'bg-green-600' : 'bg-error'"
  >
    <div class="flex items-center gap-2">
      <!-- <i class="fa-solid fa-circle-check"></i> -->
      <span>{{ message() }}</span>
    </div>
  </div>
}
