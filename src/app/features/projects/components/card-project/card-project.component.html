<div
  class="rounded-lg bg-white p-6 min-h-55 flex flex-col justify-between cursor-pointer"
  (click)="selectProject(project()!)"
  [class]="isSelected() ? 'border border-blue-600' : 'border-0'"
>
  <div>
    <div class="flex justify-between">
      <h3 class="text-lg font-medium text-seconder-800 leading-6 lg:leading-7 pb-4">
        {{ project()?.name }}
      </h3>
      <a
        class="cursor-pointer hover:opacity-100 opacity-70 transition"
        (click)="editProject(project()!)"
        [routerLink]="['/project', project()?.id, 'edit']"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M2.25 15.75H3.4875L12.4125 6.825L11.175 5.5875L2.25 14.5125V15.75ZM0.75 17.25V13.9125L12.4125 2.2875C12.5625 2.15 12.725 2.04167 12.9 1.9625C13.075 1.88333 13.2583 1.84167 13.45 1.8375C13.6417 1.83333 13.825 1.86667 14 1.9375C14.175 2.00833 14.3375 2.11667 14.4875 2.2625L15.6875 3.48333C15.8375 3.625 15.9458 3.7875 16.0125 3.9625C16.0792 4.1375 16.1125 4.31667 16.1125 4.5C16.1125 4.69167 16.0792 4.875 16.0125 5.05C15.9458 5.225 15.8375 5.3875 15.6875 5.5375L4.0375 17.25H0.75ZM11.775 6.2375L11.175 5.5875L12.4125 6.825L11.775 6.2375Z"
            fill="currentColor"
          />
        </svg>
      </a>
    </div>
    <p class="text-[.875rem] text-seconderText leading-5.5">{{ project()?.description }}</p>
  </div>

  <div class="pt-4 border-t border-t-[#C3C6D61A] flex justify-between">
    <span
      class="text-[#737685] font-bold text-[.6875rem] leading-4 tracking-[-0.55] uppercase hidden lg:block"
      >CREATED AT</span
    >
    <span class="text-seconder-800 leading-4 lg:leading-5 text-xs lg:text-[.875rem] font-medium">
      <span class="lg:hidden">
        <i class="fa-regular fa-calendar"></i>
      </span>
      {{ project()?.created_at | date: 'mediumDate' }}</span
    >
  </div>
</div>
