<div class="flex flex-col mb-3 ">
    <label class="label-input mb-1" [for]="id"> {{label}}</label>
    <div class="relative ">
        <input class="input-control w-full block" [id]="id"   [type]="type" [placeholder]="placholder" [value]="value"
           (input)="onInput($event)"  [disabled]="disabled" (blur)="onTouched()"/>
             <button (click)="toggle()" class="absolute top-1/2 inset-e-4 -translate-y-1/2 cursor-pointer" type="button">
        @if(id=='password'||id=="rePassword"){
    
        @if (flag) {
      <i class="fa-regular fa-eye-slash text-[#737685]"></i>
        }
        @else {
    
      <i class="fa-regular fa-eye text-[#737685]"></i>
        }
        }
      </button>

    </div>
</div>
